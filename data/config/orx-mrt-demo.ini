; orx-mrt-demo - Template basic config file

[Display]
; FullScreen = false + Decoration = false + no dimension -> Borderless FullScreen
Title           = orx-mrt-demo
IconList        = logo.webp
FullScreen      = true
Decoration      = true
Smoothing       = true
VSync           = true
;ScreenWidth     = 960
;ScreenHeight    = 540

[Resource]
Texture         = bundle: # bundle:orx-mrt-demo.obr # ../data/texture
Font            = bundle: # bundle:orx-mrt-demo.obr # ../data/font
Sound           = bundle: # bundle:orx-mrt-demo.obr # ../data/sound

[Bundle]
ExcludeList     = orx-mrt-demo

[Clock]
AllowSleep      = false

[Config]
DefaultParent   = Default

[Default]
KeepInCache     = true
Pivot           = center

[Input]
KEY_ESCAPE      = Quit

[Main]
ViewportList    = MainViewport # DisplayViewport

[MainViewport]
Camera          = MainCamera
TextureList     = DisplayTexture # IDTexture
BackgroundColor = black

; DisplayCamera and DisplayViewport exist to render the final display-ready texture to the screen
[DisplayCamera@MainCamera]

[DisplayViewport]
Camera          = DisplayCamera
Shader          = DisplayViewportShader

[DisplayViewportShader]
ParamList       = displaytex
displaytex      = DisplayTexture
Code            = "
void main() {
  gl_FragColor = texture2D(displaytex, gl_TexCoord[0].xy).rgba;
}
"

[MainCamera]
FrustumWidth    = 1920
FrustumHeight   = 1080
FrustumFar      = 2
FrustumNear     = 0
Position        = -1 ; Objects with -1 <= Z <= 1 will be visible
; Using a unique proxy object, sharing the same name
OnCreate        = >Camera Camera.Get MainCamera, Camera.SetPosition &Camera (0, 0), Camera.SetParent &Camera ^, >.ID return ^
TriggerList     = CameraShake

[CameraShake]
MiniShake       = Object.AddFX ^ MiniShake

[Scene]
Unique          = true
ChildList       = MainCamera # LogoLeft # LogoRight # Label

[LogoLeft@Object]
Graphic         = @
Texture         = logo.webp
Position        = right -> center
Pivot           = center
Scale           = 0.25
AngularVelocity = 18
FXList          = FadeIn # ColorCycle
TriggerList     = Reverse
Input           = @
KEY_ENTER       = Back
MOUSE_LEFT      = Back
KEY_S           = DumpTex
ID              = (1, 0, 0) ; Used to identify this object in a viewport texture
Shader          = IDShader

[LogoRight@LogoLeft]
Position        = left -> center
ID              = (0, 0, 1) ; Used to identify this object in a viewport texture

[Reverse]
Input:.Back     = > Object.GetAngularVelocity ^, > * < -1, Object.SetAngularVelocity ^ < #
                    Object.FireTrigger &MainCamera.ID MiniShake
Input:.DumpTex  = Texture.Save IDTexture id.png, Texture.Save DisplayTexture display.png

[Label]
Graphic         = @
Position        = top -> center (0, 350)
Scale           = 1.5
IgnoreFromParent= all
FXList          = @LogoLeft
Text            = @
String          = "LABEL"
Font            = SubtitleFont
Shader          = SDFShader

[SubtitleFont]
; LazenbyComp by Disaster Fonts, licensed under CC-BY-SA 4.0 (https://creativecommons.org/licenses/by-sa/4.0/)
Typeface        = LazenbyCompSmooth.ttf
SDF             = true
CharacterList   = " -(),.ABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890"
GlowMin         = 0.2
GlowOffset      = (0.9, 0.9)
GlowColor       = (0.8, 0.1, 0.1)

[FadeIn]
SlotList        = @
Type            = alpha
Curve           = smooth
StartTime       = 0
EndTime         = 1.5
StartValue      = -1
EndValue        = 0

[ColorCycle]
Loop            = true
SlotList        = @
Type            = hsv
Curve           = linear
Absolute        = true
StartTime       = 0
EndTime         = 6
StartValue      = (0, 1, 1)
EndValue        = (1, 1, 1)

[MiniShake]
SlotList        = @
Type            = scale
Curve           = sine
EndTime         = 0.12
EndValue        = 0.98

[IDShader]
ParamList       = texture # id
UseCustomParam  = true
id              = (1, 1, 1)
Code            = "
void main() {
  vec4 color = texture2D(texture, gl_TexCoord[0].xy);

  gl_FragData[0] = vec4(color.rgb * gl_Color.rgb, color.a);
  gl_FragData[1] = vec4(id.rgb * ceil(color.a), 1.0);
}
"

[SDFShader@orx:shader:font:sdf:SubtitleFont]
Main            = "
void main()
{
  vec4 Color = gl_Color;
  float SDF = orxMSDF(Texture, gl_TexCoord[0].xy);
  // Soft Edge
  Color.a = (SoftEdgeMin >= 0.0) ? smoothstep(SoftEdgeMin, SoftEdgeMax, SDF) : step(0.5, SDF);
  // Outline
  if((SDF >= OutlineOuterMin) && (SDF <= OutlineInnerMax))
  {
    Color.rgb = mix(Color.rgb, OutlineColor, (SDF <= OutlineOuterMax) ? smoothstep(OutlineOuterMin, OutlineOuterMax, SDF) : smoothstep(OutlineInnerMax, OutlineInnerMin, SDF));
  }
  // Glow/Shadow
  if(GlowMin >= 0.0)
  {
    vec4 Glow = vec4(GlowColor, GlowAlpha) * smoothstep(GlowMin, GlowMax, orxSDF(Texture, gl_TexCoord[0].xy - GlowOffset.xy / TextureSize.xy));
    Color = mix(Glow, Color, Color.a);
  }
  // Done!
  gl_FragData[0] = Color * vec4(vec3(1.0), gl_Color.a);
}
"
